<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="梅ちゃんのトレイル">
  <meta name="theme-color" content="#f4f6f3">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <title>梅ちゃんのトレイル</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="app.css">
</head>
<body>
<div id="app">

  <!-- ═══════════ LIST SCREEN ═══════════ -->
  <section id="list" class="screen">
    <header id="list-header">
      <!-- Decorative topographic contour motif (the app's signature) -->
      <svg class="topo" viewBox="0 0 220 150" preserveAspectRatio="xMaxYMin slice" aria-hidden="true">
        <g fill="none" stroke="currentColor" stroke-width="1.1" transform="rotate(-15 176 26)">
          <ellipse cx="186" cy="20" rx="16" ry="11"/>
          <ellipse cx="186" cy="20" rx="36" ry="25"/>
          <ellipse cx="186" cy="20" rx="58" ry="40"/>
          <ellipse cx="186" cy="20" rx="82" ry="56"/>
          <ellipse cx="186" cy="20" rx="108" ry="73"/>
          <ellipse cx="186" cy="20" rx="136" ry="91"/>
        </g>
      </svg>
      <div class="head-top">
        <span class="eyebrow" data-i18n="tagline">山と渓谷の道しるべ</span>
        <div class="head-actions">
          <button id="dl-all" class="dl-all-btn" data-i18n-aria="dlAllAria" aria-label="すべての地図をオフライン保存">
            <span class="dl-ic" aria-hidden="true"></span><span class="dl-lbl"></span>
          </button>
          <button id="lang-toggle" class="lang-btn" data-i18n="langOther">EN</button>
        </div>
      </div>
      <h1 data-i18n="appName">梅ちゃんのトレイル</h1>
    </header>
    <div id="filter-bar">
      <button class="chip active" data-filter="all" data-i18n="filterAll">すべて</button>
      <button class="chip" data-filter="moderate" data-i18n="filterModerate">中級</button>
      <button class="chip" data-filter="hard" data-i18n="filterHard">上級</button>
      <button class="chip" data-filter="veryhard" data-i18n="filterVeryhard">超上級</button>
      <span class="chip-div" aria-hidden="true"></span>
      <button class="chip chip-sort" data-sort="dist">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M7 4v16"/><path d="m3.5 7.5 3.5-3.5 3.5 3.5"/><path d="M17 20V4"/><path d="m13.5 16.5 3.5 3.5 3.5-3.5"/></svg>
        <span data-i18n="sortDist">距離</span>
      </button>
      <button class="chip chip-sort" data-sort="gain">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M7 4v16"/><path d="m3.5 7.5 3.5-3.5 3.5 3.5"/><path d="M17 20V4"/><path d="m13.5 16.5 3.5 3.5 3.5-3.5"/></svg>
        <span data-i18n="sortGain">標高</span>
      </button>
    </div>
    <button id="list-resume" class="list-resume" hidden>
      <span class="lr-ic" aria-hidden="true"></span>
      <span class="lr-text"><span class="lr-label"></span> · <span class="lr-trail"></span></span>
      <span class="lr-time"></span>
    </button>
    <div id="trail-list"></div>
  </section>

  <!-- ═══════════ DETAIL SCREEN ═══════════ -->
  <section id="detail" class="screen" hidden>
    <div id="detail-header">
      <button class="hbtn" id="btn-back" data-i18n-aria="back" aria-label="戻る">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m15 18-6-6 6-6"/></svg>
      </button>
      <span id="detail-title"></span>
    </div>
    <div id="map"></div>
    <button class="map-fab recenter on" id="btn-gps" data-i18n-aria="gpsAria" aria-label="現在地">
      <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.85" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="6.5"/><circle cx="12" cy="12" r="2"/><path d="M12 2.5v3"/><path d="M12 18.5v3"/><path d="M2.5 12h3"/><path d="M18.5 12h3"/></svg>
    </button>
    <button class="map-fab track" id="btn-track" data-i18n-aria="trackStartAria" aria-label="歩行の記録を開始"></button>

    <!-- Live trail-progress HUD (shown only while tracking) -->
    <div id="track-hud" hidden role="status" aria-live="polite">
      <div class="th-bar"><span class="th-fill"></span></div>
      <div class="th-row">
        <span class="th-pct">0%</span>
        <span class="th-time">
          <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="8.5"/><path d="M12 7.5V12l3.2 1.8"/></svg>
          <span class="th-num">0:00</span>
        </span>
        <button class="th-close" id="th-close" data-i18n-aria="trackEndAria" aria-label="計測を終了してリセット">
          <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 6 18 18"/><path d="M18 6 6 18"/></svg>
        </button>
      </div>
      <div class="th-msg" hidden></div>
    </div>

    <!-- Resume prompt — offered when a saved tracking session for this trail survived a reload -->
    <div id="track-resume" hidden role="alertdialog" aria-labelledby="tr-msg">
      <span class="tr-msg" id="tr-msg"></span>
      <div class="tr-actions">
        <button class="tr-dismiss" id="tr-dismiss" data-i18n="trackDismiss">破棄</button>
        <button class="tr-resume" id="tr-resume" data-i18n="trackResume">再開</button>
      </div>
    </div>

    <!-- Transient "locating…" indicator while waiting for a fresh GPS fix -->
    <div id="gps-locating" hidden role="status" aria-live="polite">
      <span class="loc-spin" aria-hidden="true"></span><span data-i18n="locating">現在地を更新中…</span>
    </div>

    <div id="sheet">
      <div class="sheet-grip" id="grip"></div>
      <div id="sheet-peek">
        <div class="pk-title" id="pk-title"></div>
        <div class="pk-meta" id="pk-meta"></div>
      </div>
      <div id="sheet-body"></div>
    </div>
  </section>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="i18n.js"></script>
<script src="trails.js"></script>
<script src="app.js"></script>
</body>
</html>
