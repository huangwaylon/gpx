<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="WA Trails">
  <meta name="theme-color" content="#0f172a">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <title>WA Trails</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="app.css">
</head>
<body>
<div id="app">

  <!-- ═══════════ LIST SCREEN ═══════════ -->
  <section id="list" class="screen">
    <header id="list-header">
      <h1>Washington Trails</h1>
      <div class="sub" id="list-sub">8 trails · tap to explore</div>
    </header>
    <div id="filter-bar">
      <button class="chip active" data-filter="all">All</button>
      <button class="chip" data-filter="easy">Easy</button>
      <button class="chip" data-filter="moderate">Moderate</button>
      <button class="chip" data-filter="hard">Hard</button>
      <button class="chip" data-filter="veryhard">Very Hard</button>
      <button class="chip" data-sort="dist">↕ Distance</button>
      <button class="chip" data-sort="gain">↕ Elevation</button>
    </div>
    <div id="trail-list"></div>
  </section>

  <!-- ═══════════ DETAIL SCREEN ═══════════ -->
  <section id="detail" class="screen" hidden>
    <div id="detail-header">
      <button class="hbtn" id="btn-back" aria-label="Back">‹</button>
      <span id="detail-title"></span>
    </div>
    <div id="map"></div>
    <button class="map-fab recenter on" id="btn-gps" aria-label="My location">◎</button>

    <div id="sheet">
      <div class="sheet-grip" id="grip"></div>
      <div id="sheet-peek">
        <div class="pk-title" id="pk-title"></div>
        <div class="pk-meta" id="pk-meta"></div>
      </div>
      <div id="sheet-body"></div>
    </div>
  </section>

  <!-- install banner -->
  <div id="install" hidden>
    <span>📲 Install: <strong>Share → Add to Home Screen</strong></span>
    <button class="x" id="install-x" aria-label="Dismiss">✕</button>
  </div>

  <!-- download modal -->
  <div id="dl-modal" hidden>
    <div class="card-m">
      <h3>Download map for offline</h3>
      <p id="dl-desc">Save this trail's map tiles so it works without service. Stays on your phone.</p>
      <div id="dl-bar-wrap"><div id="dl-bar"></div></div>
      <div id="dl-status">Ready</div>
      <div class="m-btns">
        <button class="m-btn m-btn-s" id="dl-cancel">Cancel</button>
        <button class="m-btn m-btn-p" id="dl-go">Download</button>
      </div>
    </div>
  </div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="trails.js"></script>
<script src="app.js"></script>
</body>
</html>
