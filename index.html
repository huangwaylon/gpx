<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="梅ちゃんのトレイル">
  <meta name="theme-color" content="#0f172a">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <title>梅ちゃんのトレイル</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="app.css">
</head>
<body>
<div id="app">

  <!-- ═══════════ LIST SCREEN ═══════════ -->
  <section id="list" class="screen">
    <header id="list-header">
      <div class="head-row">
        <h1 data-i18n="appName">梅ちゃんのトレイル</h1>
        <div class="head-actions">
          <button id="dl-all" class="dl-all-btn" data-i18n-aria="dlAllAria" aria-label="すべての地図をオフライン保存">⬇ 地図を保存</button>
          <button id="lang-toggle" class="lang-btn" data-i18n="langOther">EN</button>
        </div>
      </div>
      <div class="sub" id="list-sub" data-i18n="subtitle">タップして探索</div>
    </header>
    <div id="filter-bar">
      <button class="chip active" data-filter="all" data-i18n="filterAll">すべて</button>
      <button class="chip" data-filter="moderate" data-i18n="filterModerate">中級</button>
      <button class="chip" data-filter="hard" data-i18n="filterHard">上級</button>
      <button class="chip" data-filter="veryhard" data-i18n="filterVeryhard">超上級</button>
      <button class="chip" data-sort="dist" data-i18n="sortDist">↕ 距離</button>
      <button class="chip" data-sort="gain" data-i18n="sortGain">↕ 標高</button>
    </div>
    <div id="trail-list"></div>
  </section>

  <!-- ═══════════ DETAIL SCREEN ═══════════ -->
  <section id="detail" class="screen" hidden>
    <div id="detail-header">
      <button class="hbtn" id="btn-back" data-i18n-aria="back" aria-label="戻る">‹</button>
      <span id="detail-title"></span>
    </div>
    <div id="map"></div>
    <button class="map-fab recenter on" id="btn-gps" data-i18n-aria="gpsAria" aria-label="現在地">◎</button>
    <button class="map-fab track" id="btn-track" data-i18n-aria="trackStartAria" aria-label="歩行の記録を開始">▶</button>

    <!-- Live trail-progress HUD (shown only while tracking) -->
    <div id="track-hud" hidden role="status" aria-live="polite">
      <div class="th-bar"><span class="th-fill"></span></div>
      <div class="th-row">
        <span class="th-pct">0%</span>
        <span class="th-time">0:00</span>
        <span class="th-msg"></span>
        <button class="th-close" id="th-close" data-i18n-aria="trackEndAria" aria-label="計測を終了してリセット">✕</button>
      </div>
    </div>

    <div id="sheet">
      <div class="sheet-grip" id="grip"></div>
      <div id="sheet-peek">
        <div class="pk-title" id="pk-title"></div>
        <div class="pk-meta" id="pk-meta"></div>
      </div>
      <div id="sheet-body"></div>
    </div>
  </section>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="i18n.js"></script>
<script src="trails.js"></script>
<script src="app.js"></script>
</body>
</html>
